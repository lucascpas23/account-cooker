[advisories]
# Explicitly acknowledged transitive advisories. Most enter through the
# pinned, offline-only Surfpool 1.5.0 acceptance runtime. bincode is required
# by Solana's canonical transaction serialization and proc-macro-error2 also
# enters through age. Any new advisory remains a hard failure.
ignore = [
  "RUSTSEC-2020-0016",
  "RUSTSEC-2021-0139",
  "RUSTSEC-2022-0093",
  "RUSTSEC-2024-0344",
  "RUSTSEC-2024-0375",
  "RUSTSEC-2024-0384",
  "RUSTSEC-2024-0388",
  "RUSTSEC-2024-0421",
  "RUSTSEC-2024-0436",
  "RUSTSEC-2025-0134",
  "RUSTSEC-2025-0141",
  "RUSTSEC-2025-0161",
  "RUSTSEC-2026-0098",
  "RUSTSEC-2026-0099",
  "RUSTSEC-2026-0104",
  "RUSTSEC-2026-0173",
]

[licenses]
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "bzip2-1.0.6",
  "CDLA-Permissive-2.0",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MPL-2.0",
  "Unicode-3.0",
  "Zlib",
]

[bans]
# Surfpool embeds the Agave runtime and necessarily brings compatibility
# generations alongside the split SDK used by the product crates. Cargo.lock
# and the pinned Surfpool version provide the reproducibility boundary.
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
